<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace de Eletrônicos Usados</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer type="module"></script>
    <script src="js/preview.js" defer type="module"></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Voltar para Pagina de Compra</a>
                </li>
            </ul>
        </nav>
    </header>

    <main id="app">
        <!--os elementos serão gerados aqui dinamicamente pelo javascript--->
        <div class="container-form">
            <h1>Anuncie aqui o seu produto usado</h1>
            <form id="formAnuncio" class="formulario" action="POST">
                <label class="campo">
                    <span id="title-img">Escolha a imagem do produto</span>
                    <div class="preview-container">
                        <input
                            id="preview-input"
                            class="preview-input"
                            type="file"
                            accept="image/*"
                        />
                        <label class="preview-label" for="preview-input"></label>
                        <img
                            id="preview-image"
                            class="preview-image"
                            src="img/upload-icon (1).svg"
                        />
                    </div>
                </label>
                <label class="campo">
                    <span>Nome</span>
                    <input type="text" name="nome" placeholder="Ex.: Celular X 256GB" required>
                </label>

                <label class="campo">
                    <span>Slug</span>
                    <input type="text" name="slug" placeholder="Ex.: smartphone-x-256gb" required>
                </label>

                <label class="campo">
                    <span>Descrição</span>
                    <textarea name="descricao" rows="4" placeholder="Ex.: Tela AMOLED e bateria de longa duração." required></textarea>
                </label>

                <label class="campo">
                    <span>Preço</span>
                    <input type="number" name="preco" step="0.01" min="0" placeholder="Ex.: 2499.90" required>
                </label>

                <div id="container-button">
                    <button type="submit" class="botao-submit" id="submit-button">Publicar anúncio</button>
                </div>
            </form>
        </div>
        <div class="produtos-anunciados">

            <h2 id="h2-admin">Seus Produtos Anunciados:</h2>

            <div class="template-produto">
 <!---os cards dos produtos serão exibidos aqui dinamicamente pelo javascript-->
                </div>
            </div>
    </main>
</body>
</html>
